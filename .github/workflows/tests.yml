name: Factory Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install mypy

      - name: Run mypy
        run: mypy factory/ --ignore-missing-imports

      - name: Run linter (ruff/flake8/pylint fallback)
        run: make lint

      - name: Check Python syntax
        run: |
          find . -name '*.py' -print0 | xargs -0 -n1 python -m py_compile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run frontend unit tests
        working-directory: factory/static/js
        run: npm test

      - name: Run tests (stable only; exclude slow)
        run: python -m pytest factory/tests/ -v --tb=short --cov=factory -m "not slow" --cov-fail-under=70 --junitxml=test-results/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  test-flaky:
    runs-on: ubuntu-latest
    needs: lint
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run slow-marked tests (non-blocking)
        run: |
          mkdir -p test-results-flaky
          python -m pytest factory/tests/ -v --tb=short -m slow --junitxml=test-results-flaky/junit.xml

      - name: Upload flaky job results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-flaky
          path: test-results-flaky/

  coverage:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() && needs.test.result == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run coverage (minimum 70%)
        run: make coverage

      - name: Upload coverage reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

  security:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run dependency vulnerability scan
        run: |
          if command -v pip-audit >/dev/null 2>&1; then
            pip-audit
          else
            pip install pip-audit
            pip-audit
          fi
