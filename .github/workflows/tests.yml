name: Factory Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run linter (ruff/flake8/pylint fallback)
        run: |
          if command -v ruff >/dev/null 2>&1; then
            ruff check factory/
          elif command -v flake8 >/dev/null 2>&1; then
            flake8 factory/
          elif command -v pylint >/dev/null 2>&1; then
            pylint factory/
          else
            pip install flake8
            flake8 factory/
          fi

      - name: Check Python syntax
        run: |
          find . -name '*.py' -print0 | xargs -0 -n1 python -m py_compile

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests
      run: python -m pytest factory/tests/ -v --tb=short --junitxml=test-results/junit.xml

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: test-results/

  coverage:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run coverage
        run: python -m pytest factory/tests/ --cov=factory --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

      - name: Build coverage summary
        id: coverage_summary
        run: |
          python - <<'PY'
          import xml.etree.ElementTree as ET
          root = ET.parse('coverage.xml').getroot()
          line_rate = float(root.attrib.get('line-rate', 0.0)) * 100
          branch_rate = float(root.attrib.get('branch-rate', 0.0)) * 100
          summary = f"### Coverage Summary\\n- Line coverage: **{line_rate:.2f}%**\\n- Branch coverage: **{branch_rate:.2f}%**"
          with open('coverage-summary.md', 'w', encoding='utf-8') as f:
            f.write(summary)
          with open('coverage-summary.md', 'r', encoding='utf-8') as f:
            content = f.read()
          with open(__import__('os').environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as out:
            out.write('summary<<EOF\\n')
            out.write(content + '\\n')
            out.write('EOF\\n')
          PY

      - name: Comment coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.coverage_summary.outputs.summary }}`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });

  security:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run dependency vulnerability scan
        run: |
          if command -v pip-audit >/dev/null 2>&1; then
            pip-audit
          else
            pip install pip-audit
            pip-audit
          fi
